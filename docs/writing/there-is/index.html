    <section class="nested-copy-line-height lh-copy serif f4 nested-links nested-img mid-gray pr4-l w-two-thirds-l"><p>늦은 밤이었다. 하숙집으로 돌아오는 길.<br />
고개를 숙였다. 내 오른발이 땅에 닿으려던 순간이었다.<br />
그 자리에 무언가 있었다.<br />
&lsquo;못?&rsquo;<br />
가까스로 오른발을 움직였다.<br />
그 무언가를 겨우 피해 발을 땅에 디디는 순간.</p>

<p>약간, 아주 약간이었지만 확실히,<br />
그 무언가가 움직였다.</p>

<p>다행이다.<br />
참 다행이다.</p>
